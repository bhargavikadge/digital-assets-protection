yamlservices:
  - type: web
    name: vaultsafe-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: SECRET_KEY
        value: change_this_to_a_long_random_secret_key
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: DATABASE_URL
        value: sqlite:///./vaultsafe.db
      - key: UPLOAD_DIR
        value: uploads
